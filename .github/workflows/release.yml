name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-msix:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish MSIX
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish "src/NickeltownFinance/NickeltownFinance.csproj" `
            -c Release `
            -r win-x64 `
            -p:BuildMsix=true `
            -p:Version=$version `
            -p:AssemblyVersion="$version.0" `
            -p:FileVersion="$version.0" `
            -p:InformationalVersion=$version `
            -o ./artifacts/publish

      - name: Collect release assets
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          New-Item -ItemType Directory -Force -Path ./artifacts/release | Out-Null
          $msix = Get-ChildItem -Path ./artifacts -Recurse -Filter *.msix | Select-Object -First 1
          if (-not $msix) { throw "MSIX package was not produced. Ensure Windows SDK is available on the runner." }
          Copy-Item $msix.FullName ./artifacts/release/NickeltownFinance.msix

          $appInstaller = Get-Content ./packaging/NickeltownFinance.appinstaller -Raw
          $appInstaller = $appInstaller -replace 'Version="[0-9.]+"', "Version=`"$version.0`"", 1
          $appInstaller = $appInstaller -replace '(<MainPackage[^>]*Version=")[0-9.]+(")', "`${1}$version.0`${2}"
          Set-Content -Path ./artifacts/release/NickeltownFinance.appinstaller -Value $appInstaller -NoNewline

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/release/*
          generate_release_notes: true
