name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-msix:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: microsoft/setup-WinAppCli@v0.1

      - name: Publish application
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish "src/NickeltownFinance/NickeltownFinance.csproj" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:Version=$version `
            -p:AssemblyVersion="$version.0" `
            -p:FileVersion="$version.0" `
            -p:InformationalVersion=$version `
            -o ./artifacts/publish

      - name: Update manifest version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $manifestPath = "./src/NickeltownFinance/Package.appxmanifest"
          $manifest = Get-Content $manifestPath -Raw
          $manifest = $manifest -replace '(<Identity[^>]*Version=")[0-9.]+(")', "`${1}$version.0`${2}"
          Set-Content $manifestPath -Value $manifest

      - name: Pack MSIX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./artifacts/release | Out-Null
          winapp pack ./artifacts/publish `
            --manifest ./src/NickeltownFinance/Package.appxmanifest `
            --output ./artifacts/release/NickeltownFinance.msix
          if (-not (Test-Path ./artifacts/release/NickeltownFinance.msix)) {
            throw "winapp pack did not produce NickeltownFinance.msix"
          }

      - name: Prepare appinstaller
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $appInstaller = Get-Content ./packaging/NickeltownFinance.appinstaller -Raw
          $appInstaller = $appInstaller -replace '(<AppInstaller[^>]*Version=")[0-9.]+(")', "`${1}$version.0`${2}"
          $appInstaller = $appInstaller -replace '(<MainPackage[^>]*Version=")[0-9.]+(")', "`${1}$version.0`${2}"
          Set-Content -Path ./artifacts/release/NickeltownFinance.appinstaller -Value $appInstaller -NoNewline

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/release/*
          generate_release_notes: true
